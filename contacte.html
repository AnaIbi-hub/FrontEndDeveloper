  <h2>Formulari de contacte</h2>

  <form action="#" method="post">
    <label for="nom">Nom:</label><br>
    <input type="text" id="nom"><br><br>

    <label for="email">Correu electrònic:</label><br>
    <input type="email" id="email"><br><br>

    <label for="missatge">Missatge:</label><br>
    <textarea id="missatge" name="missatge" rows="5" cols="40"></textarea><br><br>

    <input type="checkbox" id="privacitat">
    <label for="privacitat">
      Accepto el tractament de les meves dades i la
      <a href="#">política de privacitat</a>
    </label><br><br>

    <button type="submit">Enviar</button>
  </form>
